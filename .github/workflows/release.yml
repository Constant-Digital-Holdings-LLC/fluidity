name: Release binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-13
            target: darwin-x64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: win32-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build standalone executable
        run: npm run build:tui-sea

      - name: Name artifact
        shell: bash
        run: |
          ext=""
          [ "${{ matrix.target }}" = "win32-x64" ] && ext=".exe"
          mv "tui/build/fluidity-tui$ext" "tui/build/fluidity-tui-${{ matrix.target }}$ext"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: tui/build/fluidity-tui-${{ matrix.target }}*
